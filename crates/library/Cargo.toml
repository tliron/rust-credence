[package]
edition = "2024"

name = "credence-lib"
description = "Web site"
version = "0.0.1"
rust-version = "1.86"

license = "MIT OR Apache-2.0"
repository = "https://github.com/tliron/rust-credence"
documentation = "https://docs.rs/credence-lib"
authors = ["Tal Liron"]

readme = "README.md"

categories = [
    "web-programming",
    "web-programming::http-server",
] # https://crates.io/category_slugs
keywords = ["web", "axum", "tower"]

[dependencies]
async-trait = "0.1.88"
axum = "0.8.4"
axum-server = { version = "0.7.2", features = ["tls-rustls"] }
bytes = "1.10.1"
bytestring = { version = "1.4.0", features = ["serde"] }
chrono = "0.4.41"
compris = { version = "=0.0.4", features = ["derive", "serde"] }
dateparser = "0.2.1"
duration-str = "0.17.0"
http = "1.3.1"
httpdate = "1.0.3"
hyper = "1.6.0"
kutil-http = "=0.0.4"
kutil-io = "=0.0.4"
kutil-std = { version = "=0.0.5", features = ["derive"] }
markdown = "1.0.0"
minijinja = { version = "2.10.2", features = ["loader", "builtins", "json"] }
minijinja-contrib = { version = "2.10.2", features = [
    "datetime",
    "rand",
    "wordcount",
] }
moka = { version = "0.12.10", features = ["future"] }
notify = "8.0.0"
regex = "1.11.1"
serde = "1.0.219"
tracing = "0.1.41"
tokio = { version = "1.45.1", features = ["rt-multi-thread"] }
